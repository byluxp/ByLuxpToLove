           <label>O que você gosta em mim?</label> 
        <!--Resposta-->
           <input type="text" placeholder="Digite aqui"> <br> <br> 

        <label> Por que você gosta disso em mim?</label>
            <input type="text" placeholder="Digite aqui"> <br> <br> 

        <label> <b>Qual é a sua parte favorita do meu corpo</b>? </label> <br> <br> 

            <input type="radio" id="olhos" name="favorito" value="olhos"> <label for="olhos">Meus olhos</label>

<!-- Área de texto-->

           <textarea name="mensagem" rows="15" cols="50" placeholder="Faça um poeminha para mim"></textarea> <br> <br>
    
<!-- Campo para seleção -->
        <label> <b>Escolha uma opção para massagem hoje: </b></label>

<!-- Opções para selecionar-->

        <option value="Costas">Costas</option>

<br> <br>
